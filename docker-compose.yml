services:
    pipeline:
        image: quant_ml_pipeline
        build: ./pipeline
        command: sh -c "cd src && python main.py"
        networks:
            - app-network
        depends_on:
            - database
        environment:
            DB_PASSWORD: ${DB_PASSWORD}
            DB_USER: ${DB_USER}
            DB_NAME: ${DB_NAME}
            DB_HOST: database
            DB_PORT: 5432
        volumes:
            - ./pipeline/src/output:/app/src/output
            - ./pipeline/src/logs:/app/src/logs
        profiles: ["dev"]

    database:
        image: postgres:16.0
        environment:
            POSTGRES_PASSWORD: ${DB_PASSWORD}
            POSTGRES_USER: ${DB_USER}
            POSTGRES_DB: ${DB_NAME}
        networks:
            - app-network
        ports:
            - "5432:5432"
        volumes:
            - quantta_db-data:/var/lib/postgresql/data
        restart: unless-stopped
        profiles: ["dev"]

volumes:
    quantta_db-data:
        external: true

networks:
    app-network:
        driver: bridge
